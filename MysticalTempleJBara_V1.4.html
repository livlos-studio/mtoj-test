<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Mystical Temple of JBara</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
  body {
    background: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #game-outer { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #scale-wrap { transform-origin: center center; display: flex; flex-direction: column; align-items: center; }
  #gw { display: flex; flex-direction: column; align-items: center; padding: 0; }
  #banner { display: block; margin-bottom: 0px; border-radius: 16px 16px 0 0; overflow: hidden; }
  #hud {
    display: flex; justify-content: space-between;
    width: 600px;
    margin-bottom: 0px;
    padding: 2px 8px;
    font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px;
  }
  #hud span {
    color: #f0c040;
    font-size: 11px;
  }
  #gc { border: 3px solid #c8960a; display: block; border-radius: 20px 20px 20px 20px; overflow: hidden; }
  #msg { color: #a08040; font-size: 6px; margin-top: 3px; text-align: center; line-height: 1.6; font-family: 'Cinzel', serif; }
  #touch-hint { color: #604020; font-size: 6px; margin-top: 1px; text-align: center; line-height: 1.6; font-family: 'Cinzel', serif; }
  #pulse-cta { color: #c8960a; font-size: 9px; margin-top: 5px; text-align: center; font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1px; }
  #game-controls { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 6px; z-index: 10; }
  .ctrl-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(20,8,0,0.72);
    border: 2px solid #c8960a;
    color: #f0c040;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: sans-serif;
    transition: background 0.15s;
    user-select: none;
  }
  .ctrl-btn:hover { background: rgba(200,150,10,0.35); }
  .ctrl-btn.active { background: rgba(200,150,10,0.5); border-color: #f0c040; }
  #leaderboard {
    width: 600px; margin-top: 4px; text-align: center;
    font-family: 'Cinzel', serif; font-size: 9px; color: #c8960a;
    letter-spacing: 1px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  #leaderboard-title { font-weight: 700; font-size: 8px; color: #a07030; letter-spacing: 2px; margin-bottom: 1px; }
  #leaderboard-rows { display: flex; gap: 18px; justify-content: center; }
  .lb-entry { display: flex; gap: 6px; align-items: center; }
  .lb-rank { color: #a07030; font-size: 7px; }
  .lb-name { color: #f0c040; font-weight: 700; font-size: 10px; }
  .lb-score { color: #c8960a; font-size: 9px; }
  /* Initials prompt overlay */
  #initials-overlay {
    display: none; position: absolute; top: 0; left: 0; width: 600px; height: 360px;
    background: rgba(10,2,25,0.92);
    z-index: 20; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
  }
  #initials-overlay.show { display: flex; }
  #initials-title { color: #f0c040; font-size: 14px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  #initials-score { color: #40e0d0; font-size: 11px; margin-bottom: 18px; }
  #initials-input {
    font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700;
    background: rgba(30,10,0,0.8); border: 2px solid #c8960a;
    color: #f0c040; text-align: center; letter-spacing: 12px;
    width: 140px; padding: 8px 12px; text-transform: uppercase;
    outline: none; border-radius: 6px;
  }
  #initials-hint { color: #a08040; font-size: 8px; margin-top: 10px; }
  #initials-submit {
    margin-top: 14px; font-family: 'Cinzel', serif; font-weight: 700;
    font-size: 10px; letter-spacing: 2px;
    background: #c8960a; color: #1a0a00; border: none; cursor: pointer;
    padding: 8px 22px; border-radius: 4px;
  }
  #initials-submit:hover { background: #f0c040; }
</style>
</head>
<body>
<div id="game-outer">
<div id="scale-wrap">
<div id="gw" style="position:relative;">
  <canvas id="banner" width="600" height="80"></canvas>
  <div id="hud">
    <span>SCORE: <span id="sv">0</span></span>
    <span>SPEED: <span id="spv">1.0</span>x</span>
    <span>HIGH SCORE: <span id="hv">0</span></span>
  </div>
  <canvas id="gc" width="600" height="360"></canvas>
  <!-- Initials entry overlay — sits over the game canvas -->
  <div id="initials-overlay">
    <div id="initials-title">🏆 NEW HIGH SCORE! 🏆</div>
    <div id="initials-score"></div>
    <input id="initials-input" maxlength="3" placeholder="AAA" autocomplete="off" spellcheck="false"/>
    <div id="initials-hint">ENTER YOUR 3-LETTER INITIALS</div>
    <button id="initials-submit">SUBMIT</button>
  </div>
  <div id="game-controls">
    <button class="ctrl-btn" id="btn-pause" title="Pause">⏸</button>
    <button class="ctrl-btn active" id="btn-mute"  title="Unmute Music">🔇</button>
  </div>
  <div id="msg">← → TO MOVE  |  SPACE TO JUMP  |  SPACE TO START</div>
</div>
<div id="touch-hint">SWIPE LEFT/RIGHT TO MOVE  |  SWIPE UP TO JUMP</div>
<div id="pulse-cta">✦ Join us at Pulse 2026 in Las Vegas — May 27–28, 2026 ✦</div>
<div id="leaderboard">
  <div id="leaderboard-title">— GLOBAL HIGH SCORES —</div>
  <div id="leaderboard-rows"><span style="color:#604020;font-size:8px;">Loading...</span></div>
</div>
</div>
</div>

<script>
// ============================================================
//  THE MYSTICAL TEMPLE OF JBARA
//  Official Pulse Conference Adventure Game
// ============================================================

// --- BANNER ---
const bn = document.getElementById('banner'), bc = bn.getContext('2d');
(function () {
  // Clip to rounded rect — top corners already handled by CSS, round bottom corners in canvas
  const R = 14;
  bc.beginPath();
  bc.moveTo(R, 0); bc.lineTo(600-R, 0); bc.arcTo(600, 0, 600, R, R);
  bc.lineTo(600, 80-R); bc.arcTo(600, 80, 600-R, 80, R);
  bc.lineTo(R, 80); bc.arcTo(0, 80, 0, 80-R, R);
  bc.lineTo(0, R); bc.arcTo(0, 0, R, 0, R);
  bc.closePath(); bc.clip();

  // Deep jungle dusk background
  const bg = bc.createLinearGradient(0, 0, 600, 80);
  bg.addColorStop(0, '#1a0a2e');
  bg.addColorStop(0.5, '#2d1055');
  bg.addColorStop(1, '#1a0a2e');
  bc.fillStyle = bg; bc.fillRect(0, 0, 600, 80);
  // scanline shimmer
  for (let y = 0; y < 80; y += 3) { bc.fillStyle = 'rgba(255,200,50,0.025)'; bc.fillRect(0, y, 600, 1); }
  // Outer gold border — rounded
  bc.strokeStyle = '#c8960a'; bc.lineWidth = 2.5;
  bc.beginPath();
  bc.moveTo(R+2, 2); bc.lineTo(598-R, 2); bc.arcTo(598, 2, 598, R+2, R);
  bc.lineTo(598, 78-R); bc.arcTo(598, 78, 598-R, 78, R);
  bc.lineTo(R+2, 78); bc.arcTo(2, 78, 2, 78-R, R);
  bc.lineTo(2, R+2); bc.arcTo(2, 2, R+2, 2, R);
  bc.closePath(); bc.stroke();
  bc.strokeStyle = '#f0c040'; bc.lineWidth = 1;
  bc.beginPath();
  bc.moveTo(R+5, 5); bc.lineTo(595-R, 5); bc.arcTo(595, 5, 595, R+5, R-2);
  bc.lineTo(595, 75-R); bc.arcTo(595, 75, 595-R, 75, R-2);
  bc.lineTo(R+5, 75); bc.arcTo(5, 75, 5, 75-R, R-2);
  bc.lineTo(5, R+5); bc.arcTo(5, 5, R+5, 5, R-2);
  bc.closePath(); bc.stroke();
  // Corner gems — only top corners (bottom ones are now rounded away)
  [[10,10],[590,10]].forEach(([x,y]) => {
    bc.fillStyle = '#8b0000'; bc.fillRect(x-4,y-4,8,8);
    bc.fillStyle = '#ff2020'; bc.fillRect(x-2,y-2,4,4);
    bc.fillStyle = 'rgba(255,255,255,0.6)'; bc.fillRect(x-1,y-1,2,2);
  });
  // Title glow
  bc.font = 'bold 22px "Cinzel Decorative"'; bc.textAlign = 'center';
  bc.shadowColor = '#ff8800'; bc.shadowBlur = 20; bc.fillStyle = '#ff8800';
  bc.fillText('THE MYSTICAL TEMPLE OF JBARA', 300, 36);
  bc.shadowBlur = 8; bc.fillStyle = '#ffd060';
  bc.fillText('THE MYSTICAL TEMPLE OF JBARA', 300, 36);
  bc.shadowBlur = 0;
  const g = bc.createLinearGradient(0, 18, 0, 48);
  g.addColorStop(0, '#fffce0'); g.addColorStop(0.4, '#f0c040');
  g.addColorStop(0.7, '#c87010'); g.addColorStop(1, '#8b4500');
  bc.fillStyle = g; bc.fillText('THE MYSTICAL TEMPLE OF JBARA', 300, 36);
  // Subtitle — 2x size (was 7px, now 13px)
  bc.font = '12px "Cinzel"'; bc.shadowColor = '#40e0d0'; bc.shadowBlur = 6;
  bc.fillStyle = '#40e0d0';
  bc.fillText('✦  A GAINSIGHT 2026 PULSE ADVENTURE  ✦', 300, 64);
  bc.shadowBlur = 0;
})();

// --- GAME SETUP ---
const canvas = document.getElementById('gc'), ctx = canvas.getContext('2d');
const W = 600, H = 360;
const HORIZON_Y = H * 0.28;
const LANE_X_BOT = [110, 300, 490];
const LANE_X_TOP = [220, 300, 380];
const GROUND_Y = H - 30;
const JUMP_DUR = 45;
const JUMP_HEIGHT = 130;

function laneXatY(li, y) {
  const t = (y - HORIZON_Y) / (H - HORIZON_Y);
  return LANE_X_TOP[li] + t * (LANE_X_BOT[li] - LANE_X_TOP[li]);
}
function perspScale(y) {
  const t = Math.max(0, (y - HORIZON_Y) / (H - HORIZON_Y));
  return 0.15 + 0.85 * t;
}
function lerp(a, b, t) { return a + (b - a) * t; }

let state = 'idle', score = 0, hi = 0, baseSpd = 2.8, spd = 2.8, frame = 0, spawnT = 0;
let lane = 1, obs = [], particles = [], groundLines = [], popups = [];
let deathT = 0, obsPassedCount = 0, elapsedSecs = 0, lastSecFrame = 0;
let spawnRate = 87, scoreTick = 0;
let banners = [], nextBannerScore = 500;
let treasures = [], treasureSpawnT = 0;
const TREASURE_SPAWN_RATE = 140;
let isJumping = false, jumpT = 0, jumpOffsetY = 0;
let holdSpaceT = 0, holdingSpace = false;
const HOLD_RESTART_MS = 1500;

// Jungle clouds — pinkish-purple to match Pulse palette
const clouds = [
  { x: 30,  y: HORIZON_Y - 70, w: 80, h: 20, spd: 0.10 },
  { x: 170, y: HORIZON_Y - 88, w: 70, h: 18, spd: 0.07 },
  { x: 320, y: HORIZON_Y - 58, w: 65, h: 16, spd: 0.12 },
  { x: 450, y: HORIZON_Y - 78, w: 85, h: 22, spd: 0.08 },
  { x: 540, y: HORIZON_Y - 52, w: 55, h: 14, spd: 0.09 },
  { x: 100, y: HORIZON_Y - 98, w: 45, h: 13, spd: 0.06 },
  { x: 390, y: HORIZON_Y - 82, w: 50, h: 12, spd: 0.11 },
  { x: -60, y: HORIZON_Y - 70, w: 75, h: 17, spd: 0.13 },
];

function initGroundLines() {
  groundLines = [];
  for (let i = 0; i < 18; i++) groundLines.push({ prog: i / 18 });
}
initGroundLines();

// ============================================================
//  STATIC SCENERY SETUP
// ============================================================

// Path edge noise (wavy jungle trails)
const PATH_NOISE = [];
(function () {
  for (let li = 0; li < 3; li++) {
    const edges = [];
    const phases = [Math.random()*6.28, Math.random()*6.28, Math.random()*6.28];
    const amps = [6, 3.5, 1.8], freqs = [1.8, 3.5, 7];
    for (let i = 0; i <= 60; i++) {
      const t = i / 60; let wl = 0, wr = 0;
      for (let k = 0; k < 3; k++) {
        wl += Math.sin(t * freqs[k] * Math.PI + phases[k]) * amps[k];
        wr += Math.sin(t * freqs[k] * Math.PI + phases[k] + 1.3) * amps[k];
      }
      edges.push({ wl, wr });
    }
    PATH_NOISE.push(edges);
  }
})();

// Jungle trees along edges (palm + tropical)
const FOREST_TREES = [];
(function () {
  const leftTrees  = [{x:-60,d:1.00},{x:-20,d:0.96},{x:-80,d:0.92},{x:-35,d:0.88},{x:-55,d:0.82},{x:-15,d:0.76},{x:-70,d:0.70},{x:-40,d:0.63},{x:-25,d:0.56},{x:-60,d:0.48},{x:-10,d:0.40},{x:-45,d:0.32},{x:-30,d:0.24},{x:-55,d:0.16},{x:-20,d:0.10},{x:-40,d:0.05}];
  const rightTrees = [{x:660,d:1.00},{x:620,d:0.96},{x:680,d:0.92},{x:635,d:0.88},{x:655,d:0.82},{x:615,d:0.76},{x:670,d:0.70},{x:640,d:0.63},{x:625,d:0.56},{x:660,d:0.48},{x:610,d:0.40},{x:645,d:0.32},{x:630,d:0.24},{x:655,d:0.16},{x:620,d:0.10},{x:640,d:0.05}];
  const innerL     = [{x:8,d:0.95},{x:38,d:0.90},{x:18,d:0.84},{x:55,d:0.78},{x:28,d:0.72},{x:12,d:0.65},{x:48,d:0.58},{x:32,d:0.51},{x:20,d:0.44},{x:60,d:0.37},{x:15,d:0.30},{x:42,d:0.23},{x:30,d:0.17},{x:52,d:0.11},{x:22,d:0.06},{x:45,d:0.03}];
  const innerR     = [{x:592,d:0.95},{x:562,d:0.90},{x:578,d:0.84},{x:548,d:0.78},{x:570,d:0.72},{x:588,d:0.65},{x:552,d:0.58},{x:568,d:0.51},{x:580,d:0.44},{x:542,d:0.37},{x:585,d:0.30},{x:558,d:0.23},{x:572,d:0.17},{x:548,d:0.11},{x:578,d:0.06},{x:555,d:0.03}];
  leftTrees.forEach(t  => FOREST_TREES.push({...t,side:'L'}));
  rightTrees.forEach(t => FOREST_TREES.push({...t,side:'R'}));
  innerL.forEach(t     => FOREST_TREES.push({...t,side:'IL'}));
  innerR.forEach(t     => FOREST_TREES.push({...t,side:'IR'}));
  [{x:20,d:0.03},{x:55,d:0.04},{x:95,d:0.02},{x:140,d:0.05},{x:180,d:0.03},{x:220,d:0.04},{x:370,d:0.03},{x:410,d:0.05},{x:450,d:0.02},{x:490,d:0.04},{x:530,d:0.03},{x:570,d:0.05}].forEach(t => FOREST_TREES.push({...t,side:'H'}));
  FOREST_TREES.sort((a,b) => a.d - b.d);
})();

// Edge ferns/jungle plants
const EDGE_GRASS = [];
(function () {
  const rng = (a,b) => a + Math.random()*(b-a);
  for (let i = 0; i < 22; i++) {
    EDGE_GRASS.push({ side:'L', t:rng(0.05,0.97), ox:rng(-55,-4), type:Math.random()<0.55?'bush':'grass', h:rng(0.7,1.8), w:rng(0.6,1.5), shade:Math.floor(rng(0,40)) });
    EDGE_GRASS.push({ side:'R', t:rng(0.05,0.97), ox:rng(4,55),   type:Math.random()<0.55?'bush':'grass', h:rng(0.7,1.8), w:rng(0.6,1.5), shade:Math.floor(rng(0,40)) });
  }
  EDGE_GRASS.sort((a,b) => a.t - b.t);
})();

// Pre-generated mud details — static so they don't flicker each frame
const MUD_DETAILS = [];
(function initMud() {
  const rng = (a,b) => a + Math.random()*(b-a);
  for (let li = 0; li < 3; li++) {
    const details = [];
    // Speckles — dense noise-like dirt grain
    for (let n = 0; n < 180; n++) {
      details.push({
        type: 'speckle',
        t: rng(0.02, 0.99),
        side: rng(-0.85, 0.85), // fraction across trail width
        size: rng(0.5, 2.2),
        dark: Math.random() < 0.55, // dark or light speckle
        alpha: rng(0.12, 0.38),
      });
    }
    // Wet mud streaks — dark lines down center
    for (let n = 0; n < 6; n++) {
      details.push({
        type: 'streak',
        tStart: rng(0.05, 0.5),
        tEnd: rng(0.55, 0.99),
        side: rng(-0.3, 0.3),
        width: rng(1.2, 3.5),
        alpha: rng(0.15, 0.3),
      });
    }
    // Puddle reflections — oval darker patches
    for (let n = 0; n < 4; n++) {
      details.push({
        type: 'puddle',
        t: rng(0.25, 0.88),
        side: rng(-0.5, 0.5),
        rw: rng(8, 18), // half-width of puddle
        rh: rng(2, 5),
        alpha: rng(0.18, 0.32),
      });
    }
    // Footprint impressions — faint darker ovals
    for (let n = 0; n < 14; n++) {
      details.push({
        type: 'footprint',
        t: rng(0.1, 0.95),
        side: rng(-0.6, 0.6),
        angle: rng(0, Math.PI),
        size: rng(1.0, 1.8),
        alpha: rng(0.10, 0.22),
      });
    }
    MUD_DETAILS.push(details);
  }
})();

// ============================================================
//  DRAW FUNCTIONS
// ============================================================

// TROPICAL PALM / JUNGLE TREE
function drawJungleTree(x, y, scale) {
  const s = scale;
  // trunk — curved slightly
  ctx.fillStyle = '#6b4820';
  ctx.fillRect(x - 3*s, y - 10*s, 5*s, 30*s);
  ctx.fillStyle = '#4a3010';
  ctx.fillRect(x - 2*s, y, 3*s, 14*s);
  // palm fronds — big tropical leaves
  const fronds = [
    {ax:-22*s,ay:-28*s,bx:10*s,by:-8*s,c:'#1a7a1a'},
    {ax:22*s,ay:-28*s,bx:-10*s,by:-8*s,c:'#206020'},
    {ax:-5*s,ay:-36*s,bx:2*s,by:-8*s,c:'#288028'},
    {ax:8*s,ay:-32*s,bx:-5*s,by:-8*s,c:'#1e6e1e'},
    {ax:-16*s,ay:-20*s,bx:12*s,by:-6*s,c:'#2a902a'},
    {ax:16*s,ay:-22*s,bx:-12*s,by:-6*s,c:'#228022'},
  ];
  fronds.forEach(f => {
    ctx.strokeStyle = f.c; ctx.lineWidth = Math.max(2, 3*s);
    ctx.beginPath(); ctx.moveTo(x+f.bx, y+f.by); ctx.quadraticCurveTo(x+(f.ax+f.bx)/2, y+(f.ay+f.by)/2-8*s, x+f.ax, y+f.ay); ctx.stroke();
    // leaf blade
    ctx.fillStyle = f.c; ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.moveTo(x+f.bx, y+f.by);
    ctx.lineTo(x+f.ax-3*s, y+f.ay+4*s);
    ctx.lineTo(x+f.ax, y+f.ay);
    ctx.lineTo(x+f.ax+3*s, y+f.ay+4*s);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  });
  // coconuts
  ctx.fillStyle = '#8b5e1a';
  ctx.beginPath(); ctx.arc(x, y-10*s, 3*s, 0, Math.PI*2); ctx.fill();
}

// MAYAN TEMPLE on horizon — original simple tiered version
function drawTemple() {
  const cx = 300, cy = HORIZON_Y - 2;
  const s = 1.875; // 25% smaller than original 2.5
  // Temple glow aura
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80*s);
  grd.addColorStop(0, 'rgba(255,180,0,0.12)');
  grd.addColorStop(1, 'rgba(255,180,0,0)');
  ctx.fillStyle = grd; ctx.fillRect(cx-90*s, cy-90*s, 180*s, 90*s);
  // Temple steps — 5 tiers, each narrower and taller
  const tiers = [
    {w:36,h:7,c:'#c8a030'},{w:28,h:7,c:'#d4aa38'},{w:20,h:7,c:'#c09020'},
    {w:13,h:8,c:'#b88820'},{w:7,h:9,c:'#a07018'},
  ];
  let baseY = cy;
  tiers.forEach((tier, i) => {
    ctx.fillStyle = tier.c;
    ctx.fillRect(cx - tier.w*s, baseY - tier.h*s, tier.w*2*s, tier.h*s);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(cx + (tier.w - 3)*s, baseY - tier.h*s, 3*s, tier.h*s);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-tier.w*s, baseY-tier.h*s/2); ctx.lineTo(cx+tier.w*s, baseY-tier.h*s/2); ctx.stroke();
    baseY -= tier.h*s;
  });
  // Temple top shrine room
  ctx.fillStyle = '#b87818'; ctx.fillRect(cx - 5*s, baseY - 12*s, 10*s, 12*s);
  ctx.fillStyle = '#c88828'; ctx.fillRect(cx - 4*s, baseY - 11*s, 8*s, 10*s);
  // Doorway
  ctx.fillStyle = '#1a0a00'; ctx.fillRect(cx - 2*s, baseY - 7*s, 4*s, 7*s);
  // Glowing treasure inside
  ctx.fillStyle = 'rgba(255,200,0,0.7)';
  ctx.beginPath(); ctx.arc(cx, baseY - 4*s, 1.5*s, 0, Math.PI*2); ctx.fill();
  // Roof ornament / stela
  ctx.fillStyle = '#d09030';
  ctx.beginPath(); ctx.moveTo(cx, baseY-18*s); ctx.lineTo(cx-3*s, baseY-12*s); ctx.lineTo(cx+3*s, baseY-12*s); ctx.closePath(); ctx.fill();
  // Steps up center of each tier
  const stepW = 3*s;
  tiers.forEach((tier, i) => {
    const gy = cy - tiers.slice(0,i).reduce((a,t)=>a+t.h,0)*s;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(cx - stepW/2, gy - tier.h*s, stepW, tier.h*s);
  });
  // Smoke/mist at base
  ctx.fillStyle = 'rgba(255,220,100,0.08)';
  ctx.fillRect(cx - 40*s, cy - 4, 80*s, 4);
}

// JUNGLE CLOUD — pinkish-purple tones
function drawCloud(cl) {
  ctx.fillStyle = 'rgba(220,160,255,0.55)';
  ctx.fillRect(cl.x, cl.y, cl.w, cl.h);
  ctx.fillRect(cl.x+cl.w*0.1, cl.y-cl.h*0.4, cl.w*0.5, cl.h*0.5);
  ctx.fillRect(cl.x+cl.w*0.45, cl.y-cl.h*0.3, cl.w*0.4, cl.h*0.4);
  ctx.fillStyle = 'rgba(255,200,255,0.4)';
  ctx.fillRect(cl.x+4, cl.y+2, 6, 4);
}

// JUNGLE FERN / BUSH
function drawJunglePlant(x, y, sc, type, hw, shade) {
  const g = 80 + shade;
  if (type === 'grass') {
    const blades = 3 + Math.floor(hw*2);
    for (let b = 0; b < blades; b++) {
      const bx = x + (b - blades/2)*4*sc;
      const bh = (14+shade*0.3)*sc*hw;
      const lean = (b-blades/2)*2.5*sc;
      ctx.fillStyle = `rgb(${Math.floor(g*0.4)},${g+60},${Math.floor(g*0.2)})`;
      ctx.beginPath(); ctx.moveTo(bx-2*sc,y); ctx.lineTo(bx+2*sc,y); ctx.lineTo(bx+lean+1*sc,y-bh); ctx.lineTo(bx+lean-1*sc,y-bh); ctx.closePath(); ctx.fill();
    }
  } else {
    const bw = (16+shade*0.2)*sc*hw, bh = (10+shade*0.15)*sc*hw;
    ctx.fillStyle = `rgb(${Math.floor(g*0.35)},${g+30},${Math.floor(g*0.2)})`;
    ctx.beginPath(); ctx.ellipse(x,y-bh*0.5,bw,bh,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgb(${Math.floor(g*0.45)},${g+60},${Math.floor(g*0.25)})`;
    ctx.beginPath(); ctx.ellipse(x-bw*0.2,y-bh*0.8,bw*0.55,bh*0.55,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+bw*0.25,y-bh*0.7,bw*0.45,bh*0.5,0,0,Math.PI*2); ctx.fill();
  }
}

// STATIC GOLDEN RETRIEVER — sits on right grass strip wearing harness
// Pre-placed at a fixed depth so it scales with perspective
const DOG_DEPTH = 0.62; // mid-distance on right side
const DOG_X = 568; // on the right grass strip

function drawStaticDog() {
  const t = DOG_DEPTH;
  const gy = HORIZON_Y + t * (H - HORIZON_Y);
  const sc = perspScale(gy) * 1.5;
  const x = DOG_X, y = gy;
  const s = sc;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x, y + 1*s, 12*s, 3*s, 0, 0, Math.PI*2); ctx.fill();

  // === BODY ===
  ctx.fillStyle = '#e8c060'; // golden retriever yellow
  ctx.beginPath(); ctx.ellipse(x - 2*s, y - 8*s, 10*s, 7*s, 0.1, 0, Math.PI*2); ctx.fill();
  // body shading underside
  ctx.fillStyle = 'rgba(160,100,20,0.25)';
  ctx.beginPath(); ctx.ellipse(x - 2*s, y - 5*s, 9*s, 4*s, 0.1, 0, Math.PI*2); ctx.fill();

  // === BACK LEGS (sitting pose) ===
  ctx.fillStyle = '#d4a840';
  // left haunch
  ctx.beginPath(); ctx.ellipse(x - 9*s, y - 5*s, 5*s, 7*s, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x - 12*s, y - 2*s, 5*s, 5*s); // paw on ground
  // right haunch
  ctx.beginPath(); ctx.ellipse(x + 5*s, y - 5*s, 4*s, 6*s, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x + 3*s, y - 2*s, 4*s, 5*s);

  // === FRONT LEGS (upright sitting, paws forward) ===
  ctx.fillStyle = '#e8c060';
  ctx.fillRect(x - 6*s, y - 8*s, 4*s, 9*s); // left front leg
  ctx.fillRect(x + 0*s, y - 8*s, 4*s, 9*s); // right front leg
  // paws
  ctx.fillStyle = '#d4a840';
  ctx.fillRect(x - 7*s, y - 1*s, 5*s, 3*s);
  ctx.fillRect(x - 1*s, y - 1*s, 5*s, 3*s);

  // === TAIL (curled up) ===
  ctx.strokeStyle = '#e8c060'; ctx.lineWidth = Math.max(2, 3*s);
  ctx.beginPath();
  ctx.moveTo(x + 8*s, y - 10*s);
  ctx.quadraticCurveTo(x + 18*s, y - 18*s, x + 14*s, y - 22*s);
  ctx.stroke();
  // tail tip fluff
  ctx.fillStyle = '#f0d070';
  ctx.beginPath(); ctx.arc(x + 14*s, y - 22*s, 2.5*s, 0, Math.PI*2); ctx.fill();

  // === HEAD ===
  ctx.fillStyle = '#e8c060';
  ctx.beginPath(); ctx.ellipse(x - 1*s, y - 20*s, 8*s, 7*s, 0, 0, Math.PI*2); ctx.fill();
  // snout/muzzle
  ctx.fillStyle = '#f0d080';
  ctx.beginPath(); ctx.ellipse(x + 5*s, y - 18*s, 5*s, 4*s, 0.2, 0, Math.PI*2); ctx.fill();
  // nose
  ctx.fillStyle = '#2a1a00';
  ctx.beginPath(); ctx.ellipse(x + 8*s, y - 17*s, 2.5*s, 1.8*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(x+7*s, y-17.5*s, 0.8*s, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#3a2000';
  ctx.beginPath(); ctx.arc(x + 1*s, y - 22*s, 1.8*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x + 1.5*s, y - 22.5*s, 0.7*s, 0, Math.PI*2); ctx.fill();
  // ears (floppy)
  ctx.fillStyle = '#c89828';
  ctx.beginPath(); ctx.moveTo(x - 8*s, y - 22*s); ctx.quadraticCurveTo(x - 14*s, y - 16*s, x - 10*s, y - 12*s); ctx.quadraticCurveTo(x - 6*s, y - 15*s, x - 6*s, y - 20*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + 5*s, y - 22*s); ctx.quadraticCurveTo(x + 9*s, y - 17*s, x + 7*s, y - 13*s); ctx.quadraticCurveTo(x + 4*s, y - 15*s, x + 3*s, y - 20*s); ctx.closePath(); ctx.fill();

  // === HARNESS ===

  // shoulder strap
  ctx.beginPath(); ctx.moveTo(x - 1*s, y - 16*s); ctx.lineTo(x - 1*s, y - 12*s); ctx.stroke();
  // harness buckle highlight

  ctx.fillRect(x - 2*s, y - 12.5*s, 3*s, 2*s);
  // handle on back (guide dog handle)

  ctx.beginPath(); ctx.moveTo(x - 5*s, y - 8*s); ctx.lineTo(x - 5*s, y - 5*s); ctx.lineTo(x + 1*s, y - 5*s); ctx.lineTo(x + 1*s, y - 8*s); ctx.stroke();
}
const TOTEMS = [
  // Left side totems at various depths
  { x: -12, d: 0.72, side: 'L' },
  { x: -8,  d: 0.44, side: 'L' },
  { x: -15, d: 0.20, side: 'L' },
  // Right side totems
  { x: 608, d: 0.68, side: 'R' },
  { x: 604, d: 0.40, side: 'R' },
  { x: 610, d: 0.18, side: 'R' },
  // A couple closer to inner edge, partially visible
  { x: 55,  d: 0.58, side: 'IL' },
  { x: 545, d: 0.52, side: 'IR' },
];

function drawTotemTower(x, y, scale) {
  const s = scale;
  // === BLOCKS — stacked from bottom to top, each with face ===
  const blocks = [
    { col: '#d4941c', face: 'skull',    h: 16 },
    { col: '#c8880e', face: 'diamond',  h: 15 },
    { col: '#d4941c', face: 'eyes',     h: 15 },
    { col: '#c8880e', face: 'ring',     h: 14 },
    { col: '#d4941c', face: 'mouth',    h: 14 },
  ];
  const bw = 14 * s;

  let by = y;
  blocks.forEach((bl, i) => {
    const bh = bl.h * s;
    // main block face
    ctx.fillStyle = bl.col;
    ctx.fillRect(x - bw/2, by - bh, bw, bh);
    // shadow right side
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fillRect(x + bw/2 - 2*s, by - bh, 2*s, bh);
    // highlight left side
    ctx.fillStyle = 'rgba(255,255,200,0.12)';
    ctx.fillRect(x - bw/2, by - bh, 2*s, bh);
    // top edge line (stacking definition)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x - bw/2, by - bh, bw, 1.5*s);
    // vine accent on some blocks
    if (i % 2 === 1) {
      ctx.strokeStyle = 'rgba(40,160,40,0.65)';
      ctx.lineWidth = Math.max(1, 1.2*s);
      ctx.beginPath();
      ctx.moveTo(x + bw/2 - 3*s, by);
      ctx.quadraticCurveTo(x + bw/2 + 2*s, by - bh*0.5, x + bw/2 - 2*s, by - bh);
      ctx.stroke();
    }
    // Face carving
    const fy = by - bh * 0.5; // vertical center of block
    ctx.fillStyle = 'rgba(80,40,0,0.6)';
    if (bl.face === 'skull') {
      // hollow circle eyes + triangle nose
      ctx.beginPath(); ctx.arc(x - 3*s, fy - 2*s, 2*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 3*s, fy - 2*s, 2*s, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(x - 1*s, fy + 1*s, 2*s, 3*s); // nose slit
      ctx.fillRect(x - 4*s, fy + 4*s, 8*s, 1.5*s); // teeth line
    } else if (bl.face === 'diamond') {
      ctx.beginPath(); ctx.moveTo(x, fy-5*s); ctx.lineTo(x+3*s, fy); ctx.lineTo(x, fy+5*s); ctx.lineTo(x-3*s, fy); ctx.closePath(); ctx.fill();
    } else if (bl.face === 'eyes') {
      // big oval eyes
      ctx.beginPath(); ctx.ellipse(x-3.5*s, fy, 2.5*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x+3.5*s, fy, 2.5*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
      // pupils
      ctx.fillStyle = bl.col;
      ctx.beginPath(); ctx.arc(x-3.5*s, fy, 1*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+3.5*s, fy, 1*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(80,40,0,0.6)';
    } else if (bl.face === 'ring') {
      ctx.beginPath(); ctx.arc(x, fy, 4*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = bl.col;
      ctx.beginPath(); ctx.arc(x, fy, 2.5*s, 0, Math.PI*2); ctx.fill();
    } else if (bl.face === 'mouth') {
      // wide grin
      ctx.fillRect(x - 5*s, fy - 1*s, 10*s, 3*s);
      ctx.fillStyle = bl.col;
      // teeth gaps
      for (let t = -4; t <= 3; t += 2.5) {
        ctx.fillRect(x + t*s, fy - 0.5*s, 1*s, 3*s);
      }
    }
    by -= bh;
  });

  // === TOTEM TOP — carved round head ===
  ctx.fillStyle = '#d4941c';
  ctx.beginPath(); ctx.arc(x, by - 6*s, 6*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(x + 4*s, by - 12*s, 2*s, 12*s);
  // parrot/bird on top (like the reference image)
  ctx.fillStyle = '#22cc44'; // green bird
  ctx.beginPath(); ctx.ellipse(x - 1*s, by - 14*s, 4*s, 3*s, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8800'; ctx.fillRect(x + 2*s, by - 15*s, 2*s, 2*s); // beak
  ctx.fillStyle = '#111';    ctx.beginPath(); ctx.arc(x, by - 15*s, 1*s, 0, Math.PI*2); ctx.fill();
  // tail feathers
  ctx.fillStyle = '#1aaa33';
  ctx.beginPath(); ctx.moveTo(x-4*s, by-13*s); ctx.lineTo(x-9*s, by-11*s); ctx.lineTo(x-7*s, by-9*s); ctx.closePath(); ctx.fill();

  // === STONE BASE ===
  ctx.fillStyle = '#8a7050';
  ctx.fillRect(x - (bw/2 + 2*s), y, bw + 4*s, 4*s);
  ctx.fillStyle = '#6a5038';
  ctx.fillRect(x - (bw/2 + 4*s), y + 3*s, bw + 8*s, 3*s);

  // === VINES hanging off side ===
  ctx.strokeStyle = 'rgba(30,140,30,0.55)'; ctx.lineWidth = Math.max(1, s);
  const towerH = blocks.reduce((a,b) => a+b.h, 0)*s;
  ctx.beginPath(); ctx.moveTo(x - bw/2 + 2*s, y); ctx.quadraticCurveTo(x - bw/2 - 3*s, y - towerH*0.5, x - bw/2 + 1*s, y - towerH); ctx.stroke();
}

// BACKGROUND — jungle dusk
function drawBg() {
  // Sky — purple/pink Pulse gradient
  const sg = ctx.createLinearGradient(0,0,0,HORIZON_Y);
  sg.addColorStop(0,'#1a0838'); sg.addColorStop(0.4,'#4a1a6a'); sg.addColorStop(0.8,'#8a3a9a'); sg.addColorStop(1,'#c06080');
  ctx.fillStyle = sg; ctx.fillRect(0,0,W,HORIZON_Y);
  // Stars
  [[40,15],[120,8],[200,20],[280,5],[360,12],[440,18],[520,8],[80,25],[340,22],[480,10]].forEach(([sx,sy]) => {
    const blink = (frame+sx*7)%80 < 40;
    ctx.fillStyle = blink ? 'rgba(255,255,200,0.9)' : 'rgba(255,255,200,0.4)';
    ctx.fillRect(sx,sy,2,2);
  });
  // Ground — rich jungle green
  const gg = ctx.createLinearGradient(0,HORIZON_Y,0,H);
  gg.addColorStop(0,'#1a5a1a'); gg.addColorStop(0.3,'#228522'); gg.addColorStop(1,'#2aaa2a');
  ctx.fillStyle = gg; ctx.fillRect(0,HORIZON_Y,W,H-HORIZON_Y);
  // Horizon mist glow
  ctx.fillStyle = 'rgba(255,150,200,0.18)'; ctx.fillRect(0,HORIZON_Y-4,W,7);

  // Jungle ridgeline silhouette
  ctx.fillStyle = 'rgba(20,60,10,0.7)';
  ctx.beginPath(); ctx.moveTo(0,HORIZON_Y);
  for (let x = 0; x <= W; x += 15) {
    const h = 18 + Math.sin(x*0.08)*12 + Math.sin(x*0.13+1)*8;
    ctx.lineTo(x, HORIZON_Y - h);
  }
  ctx.lineTo(W,HORIZON_Y); ctx.closePath(); ctx.fill();

  // Jungle trees (back to front)
  FOREST_TREES.forEach(ft => {
    const y = HORIZON_Y + ft.d*(H-HORIZON_Y);
    const mult = ft.side==='H' ? 1.0 : ft.side==='IL'||ft.side==='IR' ? 1.6 : 2.2;
    drawJungleTree(ft.x, y, perspScale(y)*mult);
  });

  // Totem towers (back to front, perspective scaled)
  [...TOTEMS].sort((a,b)=>a.d-b.d).forEach(tt => {
    const y = HORIZON_Y + tt.d*(H-HORIZON_Y);
    const sc = perspScale(y) * (tt.side==='IL'||tt.side==='IR' ? 1.4 : 2.0);
    drawTotemTower(tt.x, y, sc);
  });

  // Jungle paths — earthen dirt with richer color
  const STEPS = 60;

  // Pre-build all path edge arrays first so we can draw grass strips between them
  const allLeftPts = [], allRightPts = [];
  for (let li = 0; li < 3; li++) {
    const xBot = LANE_X_BOT[li], xTop = LANE_X_TOP[li];
    const noise = PATH_NOISE[li];
    const leftPts = [], rightPts = [];
    for (let i = 0; i <= STEPS; i++) {
      const t = i/STEPS, y = HORIZON_Y + t*(H-HORIZON_Y);
      const cx2 = xTop + t*(xBot-xTop);
      const hw = 8 + t*88;
      const {wl,wr} = noise[i];
      leftPts.push({x:cx2-hw+wl,y}); rightPts.push({x:cx2+hw+wr,y});
    }
    allLeftPts.push(leftPts);
    allRightPts.push(rightPts);
  }

  // Draw GRASS STRIPS between paths (right edge of path 0 → left edge of path 1, and right of 1 → left of 2)
  // This makes the green strips explicit, symmetric, and span horizon to bottom
  for (let gap = 0; gap < 2; gap++) {
    const rightEdge = allRightPts[gap];    // right edge of left path
    const leftEdge  = allLeftPts[gap+1];   // left edge of right path
    for (let i = 0; i < STEPS; i++) {
      const t = i/STEPS;
      // Green grass color — richer toward bottom
      const gr = Math.floor(30 + t*20);
      const gg2 = Math.floor(110 + t*60);
      const gb = Math.floor(20 + t*15);
      ctx.fillStyle = `rgb(${gr},${gg2},${gb})`;
      ctx.beginPath();
      ctx.moveTo(rightEdge[i].x,   rightEdge[i].y);
      ctx.lineTo(leftEdge[i].x,    leftEdge[i].y);
      ctx.lineTo(leftEdge[i+1].x,  leftEdge[i+1].y);
      ctx.lineTo(rightEdge[i+1].x, rightEdge[i+1].y);
      ctx.closePath(); ctx.fill();
      // Grass texture highlight every few strips
      if (i % 4 === 0) {
        ctx.fillStyle = `rgba(60,180,40,${0.12*t})`;
        ctx.beginPath();
        ctx.moveTo(rightEdge[i].x,   rightEdge[i].y);
        ctx.lineTo(leftEdge[i].x,    leftEdge[i].y);
        ctx.lineTo(leftEdge[i+1].x,  leftEdge[i+1].y);
        ctx.lineTo(rightEdge[i+1].x, rightEdge[i+1].y);
        ctx.closePath(); ctx.fill();
      }
    }
  }

  // Draw the three dirt paths on top — full muddy treatment
  for (let li = 0; li < 3; li++) {
    const leftPts  = allLeftPts[li];
    const rightPts = allRightPts[li];
    const xBot = LANE_X_BOT[li], xTop = LANE_X_TOP[li];

    // --- BASE DIRT: varied tonal bands (not uniform) ---
    for (let i = 0; i < STEPS; i++) {
      const t = i / STEPS;
      // Alternate slightly between darker wet patches and drier lighter patches
      const bandNoise = Math.sin(i * 0.7 + li * 2.1) * 0.5 + Math.sin(i * 1.8 + li) * 0.3;
      const wet = bandNoise > 0.1; // wetter = darker
      const r = Math.floor(wet ? 98+t*14  : 122+t*16);
      const g2 = Math.floor(wet ? 96+t*14  : 118+t*16);
      const b  = Math.floor(wet ? 72+t*12  : 88+t*14);
      ctx.fillStyle = `rgb(${r},${g2},${b})`;
      ctx.beginPath();
      ctx.moveTo(leftPts[i].x, leftPts[i].y);
      ctx.lineTo(rightPts[i].x, rightPts[i].y);
      ctx.lineTo(rightPts[i+1].x, rightPts[i+1].y);
      ctx.lineTo(leftPts[i+1].x, leftPts[i+1].y);
      ctx.closePath(); ctx.fill();
    }

    // --- CRUMBLY EDGE SHADOWS — dark fringe where dirt meets grass ---
    ctx.save();
    ctx.beginPath();
    leftPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    [...rightPts].reverse().forEach(p => ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.clip();

    // Left edge shadow
    const leftGrd = ctx.createLinearGradient(-1, 0, 1, 0);
    for (let i = 0; i < STEPS; i++) {
      const t = i/STEPS;
      const lx = leftPts[i].x, ly = leftPts[i].y;
      const hw = (8 + t*88) * 0.18; // shadow band width
      ctx.fillStyle = `rgba(50,52,38,${0.28 + t*0.18})`;
      ctx.fillRect(lx, ly, hw * perspScale(ly) * 12, (H/STEPS) + 1);
    }
    // Right edge shadow
    for (let i = 0; i < STEPS; i++) {
      const t = i/STEPS;
      const rx = rightPts[i].x, ry = rightPts[i].y;
      const hw = (8 + t*88) * 0.18;
      ctx.fillStyle = `rgba(50,52,38,${0.22 + t*0.14})`;
      ctx.fillRect(rx - hw * perspScale(ry) * 12, ry, hw * perspScale(ry) * 12, (H/STEPS) + 1);
    }

    // --- WORN CENTER: slightly lighter dried mud strip ---
    const hg = ctx.createLinearGradient(0, HORIZON_Y, 0, H);
    hg.addColorStop(0, 'rgba(170,175,140,0.0)');
    hg.addColorStop(0.3, 'rgba(165,170,135,0.09)');
    hg.addColorStop(1, 'rgba(175,180,145,0.18)');
    ctx.fillStyle = hg; ctx.fillRect(0, HORIZON_Y, W, H-HORIZON_Y);

    ctx.restore();

    // --- MUD DETAILS: speckles, streaks, puddles, footprints ---
    ctx.save();
    ctx.beginPath();
    leftPts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    [...rightPts].reverse().forEach(p => ctx.lineTo(p.x,p.y));
    ctx.closePath(); ctx.clip();

    MUD_DETAILS[li].forEach(d => {
      if (d.type === 'speckle') {
        const y = HORIZON_Y + d.t * (H - HORIZON_Y);
        const cx2 = xTop + d.t * (xBot - xTop);
        const hw = 8 + d.t * 88;
        const x = cx2 + d.side * hw;
        const sc = perspScale(y);
        const sz = Math.max(0.5, d.size * sc);
        ctx.fillStyle = d.dark
          ? `rgba(45,47,34,${d.alpha})`
          : `rgba(175,180,148,${d.alpha * 0.8})`;
        ctx.fillRect(x - sz/2, y - sz/2, sz, sz);

      } else if (d.type === 'streak') {
        const y0 = HORIZON_Y + d.tStart * (H - HORIZON_Y);
        const y1 = HORIZON_Y + d.tEnd   * (H - HORIZON_Y);
        const cx0 = xTop + d.tStart * (xBot - xTop);
        const cx1 = xTop + d.tEnd   * (xBot - xTop);
        const hw0 = 8 + d.tStart * 88, hw1 = 8 + d.tEnd * 88;
        const x0 = cx0 + d.side * hw0 * 0.5;
        const x1 = cx1 + d.side * hw1 * 0.5;
        const grad = ctx.createLinearGradient(x0, y0, x1, y1);
        grad.addColorStop(0, `rgba(40,42,30,0)`);
        grad.addColorStop(0.2, `rgba(40,42,30,${d.alpha})`);
        grad.addColorStop(0.8, `rgba(40,42,30,${d.alpha})`);
        grad.addColorStop(1, `rgba(40,42,30,0)`);
        ctx.strokeStyle = grad;
        ctx.lineWidth = Math.max(0.5, d.width * perspScale(y1));
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();

      } else if (d.type === 'puddle') {
        const y = HORIZON_Y + d.t * (H - HORIZON_Y);
        const cx2 = xTop + d.t * (xBot - xTop);
        const hw = 8 + d.t * 88;
        const x = cx2 + d.side * hw * 0.6;
        const sc = perspScale(y);
        const pw = d.rw * sc, ph = d.rh * sc;
        // Dark muddy puddle
        ctx.fillStyle = `rgba(38,40,30,${d.alpha})`;
        ctx.beginPath(); ctx.ellipse(x, y, pw, ph, 0, 0, Math.PI*2); ctx.fill();
        // Sky reflection glint (top portion of puddle)
        ctx.fillStyle = `rgba(160,180,220,${d.alpha * 0.35})`;
        ctx.beginPath(); ctx.ellipse(x - pw*0.15, y - ph*0.2, pw*0.55, ph*0.45, 0, 0, Math.PI*2); ctx.fill();

      } else if (d.type === 'footprint') {
        const y = HORIZON_Y + d.t * (H - HORIZON_Y);
        const cx2 = xTop + d.t * (xBot - xTop);
        const hw = 8 + d.t * 88;
        const x = cx2 + d.side * hw * 0.7;
        const sc = perspScale(y);
        ctx.fillStyle = `rgba(42,44,32,${d.alpha})`;
        ctx.beginPath();
        ctx.ellipse(x, y, 3.5*sc*d.size, 5.5*sc*d.size, d.angle, 0, Math.PI*2);
        ctx.fill();
      }
    });

    ctx.restore();
  }

  // Edge jungle plants
  EDGE_GRASS.forEach(eg => {
    const t = eg.t, gy = HORIZON_Y+t*(H-HORIZON_Y), sc = perspScale(gy);
    let baseX;
    if (eg.side==='L') { const cx2=LANE_X_TOP[0]+t*(LANE_X_BOT[0]-LANE_X_TOP[0]); baseX=cx2-(8+t*88)+eg.ox*sc; }
    else { const cx2=LANE_X_TOP[2]+t*(LANE_X_BOT[2]-LANE_X_TOP[2]); baseX=cx2+(8+t*88)+eg.ox*sc; }
    drawJunglePlant(baseX,gy,sc,eg.type,eg.w,eg.shade);
  });

  // Golden Retriever sitting on right grass strip
  drawStaticDog();

  // Ground depth lines
  groundLines.forEach(gl => {
    const y = HORIZON_Y+gl.prog*(H-HORIZON_Y);
    ctx.strokeStyle = `rgba(20,100,20,${gl.prog*0.15})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });
}

// EXPLORER (replaces marmot)
function drawExplorer(laneIdx, dead) {
  const bx = LANE_X_BOT[laneIdx];
  const by = GROUND_Y + jumpOffsetY;
  const blink = dead && Math.floor(frame/4)%2===0;
  const s = 1.5;
  function r(x,y,w,h){ctx.fillRect(bx+x*s,by+y*s,w*s,h*s);}

  // Shadow
  const shadowScale = isJumping ? Math.max(0.2,1-Math.abs(jumpOffsetY)/JUMP_HEIGHT) : 1;
  ctx.fillStyle = `rgba(0,0,0,${0.22*shadowScale})`;
  ctx.fillRect(bx-14*s*shadowScale, GROUND_Y+4, 28*s*shadowScale, 6*s*shadowScale);

  // === MAP in left hand — held out, slightly animated ===
  if (!isJumping) {
    const mapSwing = Math.sin(frame*0.18)*2*s;
    // map body (folded paper)
    ctx.fillStyle = '#f5e8c0';
    ctx.fillRect(bx-18*s, by-28*s+mapSwing, 12*s, 9*s);
    // map fold lines
    ctx.strokeStyle = '#c8a860'; ctx.lineWidth = Math.max(0.5, 0.6*s);
    ctx.beginPath(); ctx.moveTo(bx-12*s, by-28*s+mapSwing); ctx.lineTo(bx-12*s, by-19*s+mapSwing); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx-18*s, by-24*s+mapSwing); ctx.lineTo(bx-6*s, by-24*s+mapSwing); ctx.stroke();
    // map squiggles (route lines)
    ctx.strokeStyle = '#8b4a10'; ctx.lineWidth = Math.max(0.5, 0.5*s);
    ctx.beginPath(); ctx.moveTo(bx-17*s, by-27*s+mapSwing); ctx.lineTo(bx-14*s, by-25*s+mapSwing); ctx.lineTo(bx-11*s, by-26*s+mapSwing); ctx.stroke();
    // small X marks the spot
    ctx.strokeStyle = '#cc1111'; ctx.lineWidth = Math.max(0.5, 0.7*s);
    ctx.beginPath(); ctx.moveTo(bx-9*s, by-22*s+mapSwing); ctx.lineTo(bx-7*s, by-20*s+mapSwing); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx-7*s, by-22*s+mapSwing); ctx.lineTo(bx-9*s, by-20*s+mapSwing); ctx.stroke();
    // hand holding map
    ctx.fillStyle = '#c8a070'; ctx.fillRect(bx-14*s, by-19*s+mapSwing, 5*s, 4*s);
  }

  // === EXPLORER BODY ===
  // Boots
  ctx.fillStyle = '#4a2810'; r(-5,0,4,8); r(2,0,4,8);
  ctx.fillStyle = '#3a1e08'; r(-6,5,5,3); r(1,5,5,3);
  // Pants — dark brown
  ctx.fillStyle = blink?'#ff4444':'#5a3218'; r(-5,-14,12,15);
  // Shirt — tan/khaki
  ctx.fillStyle = blink?'#ff6666':'#c8a870'; r(-6,-26,14,14);
  // WHITE TIE — centered on shirt front
  ctx.fillStyle = blink?'#ffaaaa':'#f8f8f8';
  r(-1,-25,4,11); // tie body
  // tie knot (slightly wider at top)
  ctx.fillStyle = blink?'#ffaaaa':'#eeeeee';
  r(-2,-26,5,3);
  // tie point
  ctx.fillStyle = blink?'#ffaaaa':'#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(bx-1*s, by-14*s); ctx.lineTo(bx+3*s, by-14*s); ctx.lineTo(bx+1*s, by-11*s);
  ctx.closePath(); ctx.fill();

  // Right arm animated (free arm swings)
  const armSwing = Math.sin(frame*0.25)*4*s;
  ctx.fillStyle = '#c8a870'; ctx.fillRect(bx+6*s, by-24*s+armSwing, 3*s, 10*s);
  // Left arm — holds map (straighter, less swing)
  ctx.fillStyle = '#c8a870'; ctx.fillRect(bx-8*s, by-26*s, 3*s, 10*s);

  // Backpack
  ctx.fillStyle = '#8b4a10'; r(5,-24,5,10);
  ctx.fillStyle = '#6b3a08'; r(6,-22,3,7);

  // Neck + head
  ctx.fillStyle = '#c8a070'; r(-2,-30,6,5);
  ctx.fillStyle = blink?'#ff7777':'#c8a070'; r(-5,-40,12,12);
  // Hair
  ctx.fillStyle = '#5a3010'; r(-5,-41,12,3);

  // Face features
  ctx.fillStyle = '#a06030'; r(-1,-33,4,3); // nose

  // PRESCRIPTION GLASSES — round frames
  if (!dead) {
    // lens tint (blue-grey) — drawn first, behind frames
    ctx.fillStyle = 'rgba(160,200,240,0.22)';
    ctx.beginPath(); ctx.arc(bx-3*s, by-36*s, 2.8*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx+4*s, by-36*s, 2.8*s, 0, Math.PI*2); ctx.fill();
    // lens frames
    ctx.strokeStyle = '#3a2a10'; ctx.lineWidth = Math.max(1, 1.2*s);
    ctx.beginPath(); ctx.arc(bx-3*s, by-36*s, 3*s, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(bx+4*s, by-36*s, 3*s, 0, Math.PI*2); ctx.stroke();
    // bridge
    ctx.beginPath(); ctx.moveTo(bx+0*s, by-36*s); ctx.lineTo(bx+1*s, by-36*s); ctx.stroke();
    // arms
    ctx.beginPath(); ctx.moveTo(bx-6*s, by-36*s); ctx.lineTo(bx-7*s, by-35*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+7*s, by-36*s); ctx.lineTo(bx+8*s, by-35*s); ctx.stroke();
    // reflection highlight — diagonal streak across each lens
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillRect(bx-5.5*s, by-38.5*s, 2*s, 1*s);
    ctx.fillRect(bx-4.5*s, by-37.5*s, 1*s, 1*s);
    ctx.fillRect(bx+1.5*s, by-38.5*s, 2*s, 1*s);
    ctx.fillRect(bx+2.5*s, by-37.5*s, 1*s, 1*s);
  } else {
    // dead X eyes
    ctx.fillStyle = '#f00';
    r(-3,-37,3,3); r(3,-37,3,3);
    ctx.fillStyle='#fff'; r(-2,-36,1,1); r(4,-36,1,1);
  }

  // WIDE BRIM EXPLORER HAT — extra wide brim like reference
  ctx.fillStyle = '#5a2e0e'; r(-5,-44,12,2); // brim-crown join
  ctx.fillStyle = '#c8a020'; r(-4,-45,10,2); // hat band gold
  // Crown — 20% shorter (height 10 instead of 12)
  ctx.fillStyle = blink?'#ff7744':'#7a4418'; r(-5,-54,12,10);
  // Top of crown
  ctx.fillStyle = blink?'#ff7744':'#6b3a10'; r(-5,-55,12,2);
  // WIDE brim — extends much further than before
  ctx.fillStyle = blink?'#ff6633':'#6b3a10'; r(-11,-44,24,5);
  // brim underside shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; r(-11,-43,24,2);
  // brim front edge highlight
  ctx.fillStyle = 'rgba(255,200,100,0.2)'; r(-11,-44,24,1);

  // Legs animated
  ctx.fillStyle = '#5a3218';
  const lp = Math.floor(frame/5)%2;
  if(!isJumping){
    if(lp===0){r(-4,-3,4,10);r(2,-1,4,8);}else{r(-4,-1,4,8);r(2,-3,4,10);}
  } else {
    r(-6,-2,5,7); r(3,-2,5,7);
  }
}

// COCKATOO — replaces biplane, carries score banner
function drawCockatoo(pl) {
  const x = pl.x, y = pl.skyY, s = 1.6;
  const wingFlap = Math.sin(pl.propT*2)*18; // wing flap angle in degrees
  ctx.save();

  // === BODY ===
  ctx.fillStyle = '#f8f0e0'; // white cockatoo
  ctx.beginPath(); ctx.ellipse(x, y, 22*s, 11*s, 0, 0, Math.PI*2); ctx.fill();
  // body shading
  ctx.fillStyle = 'rgba(200,180,160,0.3)';
  ctx.beginPath(); ctx.ellipse(x+3*s, y+3*s, 16*s, 7*s, 0.2, 0, Math.PI*2); ctx.fill();

  // === WINGS (animated flap) ===
  ctx.save();
  ctx.translate(x-5*s, y-4*s);
  ctx.rotate(-wingFlap * Math.PI/180);
  ctx.fillStyle = '#f0e8d0';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-35*s,-8*s); ctx.lineTo(-40*s,8*s); ctx.lineTo(-20*s,14*s); ctx.lineTo(0,8*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(180,160,120,0.4)';
  ctx.beginPath(); ctx.moveTo(-5*s,2*s); ctx.lineTo(-30*s,-4*s); ctx.lineTo(-35*s,6*s); ctx.lineTo(-15*s,10*s); ctx.closePath(); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(x-5*s, y+4*s);
  ctx.rotate(wingFlap * Math.PI/180);
  ctx.fillStyle = '#f0e8d0';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-35*s,8*s); ctx.lineTo(-40*s,-8*s); ctx.lineTo(-20*s,-14*s); ctx.lineTo(0,-8*s); ctx.closePath(); ctx.fill();
  ctx.restore();

  // === HEAD ===
  ctx.fillStyle = '#f8f0e0';
  ctx.beginPath(); ctx.arc(x+18*s, y-4*s, 12*s, 0, Math.PI*2); ctx.fill();

  // === YELLOW CREST (cockatoo signature) ===
  ctx.fillStyle = '#f0d000';
  // animated crest raises slightly with wing beat
  const crestLift = Math.abs(Math.sin(pl.propT*2))*3*s;
  ctx.beginPath(); ctx.moveTo(x+14*s, y-14*s-crestLift);
  ctx.lineTo(x+16*s, y-22*s-crestLift); ctx.lineTo(x+18*s, y-14*s-crestLift); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+18*s, y-15*s-crestLift);
  ctx.lineTo(x+20*s, y-24*s-crestLift); ctx.lineTo(x+22*s, y-15*s-crestLift); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+22*s, y-14*s-crestLift);
  ctx.lineTo(x+24*s, y-22*s-crestLift); ctx.lineTo(x+26*s, y-14*s-crestLift); ctx.closePath(); ctx.fill();
  // crest base
  ctx.fillStyle = '#d4b800'; ctx.fillRect(x+13*s, y-15*s, 14*s, 4*s);

  // === BEAK ===
  ctx.fillStyle = '#c8a020';
  ctx.beginPath(); ctx.moveTo(x+28*s, y-5*s); ctx.lineTo(x+38*s, y-2*s); ctx.lineTo(x+28*s, y); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a08010';
  ctx.beginPath(); ctx.moveTo(x+28*s, y-2*s); ctx.lineTo(x+36*s, y); ctx.lineTo(x+28*s, y+1*s); ctx.closePath(); ctx.fill();

  // === EYE ===
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(x+24*s, y-6*s, 2.5*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x+25*s, y-7*s, 1*s, 0, Math.PI*2); ctx.fill();
  // eye ring
  ctx.strokeStyle = '#c8a020'; ctx.lineWidth = 1.5*s;
  ctx.beginPath(); ctx.arc(x+24*s, y-6*s, 4*s, 0, Math.PI*2); ctx.stroke();

  // === TAIL FEATHERS ===
  ctx.fillStyle = '#f0e8d0';
  ctx.beginPath(); ctx.moveTo(x-22*s, y-2*s); ctx.lineTo(x-38*s, y-6*s); ctx.lineTo(x-36*s, y+2*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x-22*s, y+2*s); ctx.lineTo(x-38*s, y+6*s); ctx.lineTo(x-36*s, y-2*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e8dfc8';
  ctx.beginPath(); ctx.moveTo(x-22*s, y); ctx.lineTo(x-42*s, y); ctx.lineTo(x-38*s, y+3*s); ctx.closePath(); ctx.fill();

  // === FEET (dangling below, holding rope) ===
  ctx.strokeStyle = '#e8c080'; ctx.lineWidth = 2*s;
  ctx.beginPath(); ctx.moveTo(x+5*s, y+10*s); ctx.lineTo(x, y+18*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+8*s, y+10*s); ctx.lineTo(x+12*s, y+18*s); ctx.stroke();
  // talons
  ctx.strokeStyle = '#c0a060'; ctx.lineWidth = 1.5*s;
  [[x-3*s,x],[x,x+4*s],[x+3*s,x+7*s]].forEach(([tx1,tx2])=>{
    ctx.beginPath(); ctx.moveTo(x+1*s,y+18*s); ctx.lineTo(tx1,y+22*s); ctx.stroke();
  });

  // === ROPE trailing behind (to the left) ===
  const ropeStartX = x - 22*s;
  const ropeLen = 50*s;
  ctx.strokeStyle = '#a08040'; ctx.lineWidth = Math.max(1, s*0.8);
  ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(ropeStartX, y+8*s);
  ctx.quadraticCurveTo(ropeStartX-ropeLen*0.5, y+16*s, ropeStartX-ropeLen, y+10*s);
  ctx.stroke(); ctx.setLineDash([]);

  // === BANNER ===
  const bx = ropeStartX - ropeLen - 58*s;
  const bw = 58*s, bh = 26*s, bby = y+10*s-bh*0.5;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(bx+2*s,bby+3*s,bw,bh);
  // parchment body
  ctx.fillStyle = '#f5e8b0'; ctx.fillRect(bx,bby,bw,bh);
  // gold top stripe
  ctx.fillStyle = '#c8960a'; ctx.fillRect(bx,bby,bw,5*s);
  ctx.fillStyle = 'rgba(255,220,100,0.5)'; ctx.fillRect(bx,bby+5*s,bw,2*s);
  // border
  ctx.strokeStyle = '#8b6010'; ctx.lineWidth = Math.max(1,s*0.8);
  ctx.strokeRect(bx,bby,bw,bh);
  // score label
  const label = pl.pts>=1000 ? Math.floor(pl.pts/1000)+','+String(pl.pts%1000).padStart(3,'0') : String(pl.pts);
  const fs = Math.max(7, Math.floor(s*10));
  ctx.fillStyle = '#5a2000'; ctx.font = `bold ${fs}px "Cinzel"`;
  ctx.textAlign = 'center';
  ctx.fillText(label, bx+bw*0.5, bby+bh*0.52+fs*0.4);
  ctx.fillStyle = '#8b4000'; ctx.font = `${Math.max(5,Math.floor(s*5))}px "Cinzel"`;
  ctx.fillText('PTS', bx+bw*0.5, bby+bh*0.82+2);
  ctx.textAlign = 'left';

  ctx.restore();
}

// TOPPLED TREE OBSTACLE (same mechanic, jungle log)
function drawToppledLog(x, y, s) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(0.12);
  ctx.fillStyle = '#5a3818'; ctx.fillRect(-30*s,-5*s,60*s,10*s);
  ctx.fillStyle = '#3d2208';
  for(let i=-25;i<30;i+=8) ctx.fillRect(i*s,-5*s,2*s,10*s);
  // mossy green overgrowth
  ctx.fillStyle = 'rgba(40,160,40,0.45)'; ctx.fillRect(-26*s,-5*s,14*s,4*s);
  ctx.fillStyle = 'rgba(60,180,30,0.35)'; ctx.fillRect(4*s,-4*s,12*s,3*s);
  // cut ends
  ctx.fillStyle = '#8a5828'; ctx.beginPath(); ctx.ellipse(-30*s,0,5*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4a060'; ctx.beginPath(); ctx.ellipse(30*s,0,5*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#b07840'; ctx.beginPath(); ctx.ellipse(30*s,0,3.5*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#8a5828'; ctx.beginPath(); ctx.ellipse(30*s,0,1.5*s,1.5*s,0,0,Math.PI*2); ctx.fill();
  // branch stubs
  ctx.fillStyle = '#5a3818'; ctx.fillRect(-12*s,-8*s,4*s,5*s); ctx.fillRect(8*s,-7*s,3*s,4*s);
  ctx.restore();
}

// SPIDER OBSTACLE (replaces rocks — 6 styles)
function drawSpider(x, y, s) {
  // Black tarantula
  // thick fuzzy legs first (behind body)
  [[-1,-1],[0,-1.1],[1,-1],[-1.5,0],[1.5,0],[-1,1],[0,1.1],[1,1]].forEach(([lx,ly])=>{
    ctx.strokeStyle='#1a0a0a'; ctx.lineWidth=Math.max(2,2.8*s);
    const ex=x+lx*20*s, ey=y+ly*13*s-6*s;
    const kx=x+lx*9*s, ky=ey-5*s;
    ctx.beginPath(); ctx.moveTo(x+lx*5*s,y-10*s); ctx.quadraticCurveTo(kx,ky,ex,ey); ctx.stroke();
    // fuzzy hair on legs
    ctx.strokeStyle='rgba(60,30,10,0.5)'; ctx.lineWidth=Math.max(1,s);
    for(let h=0;h<3;h++){
      const ht=0.3+h*0.2;
      const hx=x+lx*5*s+(ex-x-lx*5*s)*ht, hy=y-10*s+(ey-y+10*s)*ht;
      ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx+lx*s*1.5,hy-s*2); ctx.stroke();
    }
  });
  // abdomen (large, round, black)
  ctx.fillStyle='#111111';
  ctx.beginPath(); ctx.ellipse(x,y-8*s,13*s,11*s,0,0,Math.PI*2); ctx.fill();
  // abdomen sheen
  ctx.fillStyle='rgba(80,60,80,0.35)';
  ctx.beginPath(); ctx.ellipse(x-2*s,y-11*s,6*s,4*s,-0.4,0,Math.PI*2); ctx.fill();
  // cephalothorax (head, slightly smaller)
  ctx.fillStyle='#1a0a0a';
  ctx.beginPath(); ctx.ellipse(x,y-19*s,9*s,8*s,0,0,Math.PI*2); ctx.fill();
  // fuzzy body texture
  ctx.strokeStyle='rgba(60,30,10,0.4)'; ctx.lineWidth=Math.max(0.5,0.7*s);
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*11*s,y-8*s+Math.sin(a)*9*s);
    ctx.lineTo(x+Math.cos(a)*14*s,y-8*s+Math.sin(a)*13*s);
    ctx.stroke();
  }
  // 8 red eyes in two rows
  ctx.fillStyle='#cc1111';
  [[x-4*s,y-22*s],[x-1.5*s,y-23*s],[x+1.5*s,y-23*s],[x+4*s,y-22*s],
   [x-3*s,y-20*s],[x-1*s,y-21*s],[x+1*s,y-21*s],[x+3*s,y-20*s]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.arc(ex,ey,1.1*s,0,Math.PI*2); ctx.fill();
  });
  // fangs
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(x-2.5*s,y-15*s,2*s,3*s,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+2.5*s,y-15*s,2*s,3*s,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(60,20,60,0.6)';
  ctx.beginPath(); ctx.ellipse(x-2.5*s,y-14*s,1*s,1.5*s,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+2.5*s,y-14*s,1*s,1.5*s,-0.3,0,Math.PI*2); ctx.fill();
}

// TREASURE — blue diamond and red ruby collectibles
function drawDiamond(x, y, s) {
  // Gold pulsing outer glow — signals "collect me"
  const pulse = 0.55 + Math.sin(frame*0.12)*0.35;
  const goldGlow = ctx.createRadialGradient(x, y-8*s, 2*s, x, y-8*s, 18*s);
  goldGlow.addColorStop(0, `rgba(255,210,40,${0.5*pulse})`);
  goldGlow.addColorStop(0.5, `rgba(255,180,0,${0.25*pulse})`);
  goldGlow.addColorStop(1, 'rgba(255,180,0,0)');
  ctx.fillStyle = goldGlow; ctx.fillRect(x-20*s, y-26*s, 40*s, 36*s);

  const glow = ctx.createRadialGradient(x, y-6*s, 0, x, y-6*s, 12*s);
  glow.addColorStop(0, 'rgba(80,180,255,0.45)');
  glow.addColorStop(1, 'rgba(80,180,255,0)');
  ctx.fillStyle = glow; ctx.fillRect(x-12*s, y-18*s, 24*s, 24*s);
  // diamond shape
  ctx.fillStyle = '#1a8aff';
  ctx.beginPath();
  ctx.moveTo(x, y-18*s);       // top
  ctx.lineTo(x+10*s, y-8*s);   // right
  ctx.lineTo(x, y+2*s);        // bottom
  ctx.lineTo(x-10*s, y-8*s);   // left
  ctx.closePath(); ctx.fill();
  // facets
  ctx.fillStyle = '#60c0ff';
  ctx.beginPath(); ctx.moveTo(x, y-18*s); ctx.lineTo(x+10*s, y-8*s); ctx.lineTo(x, y-8*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#004aaa';
  ctx.beginPath(); ctx.moveTo(x, y-8*s); ctx.lineTo(x+10*s, y-8*s); ctx.lineTo(x, y+2*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.moveTo(x-2*s, y-17*s); ctx.lineTo(x+3*s, y-13*s); ctx.lineTo(x-1*s, y-13*s); ctx.closePath(); ctx.fill();
  // outline
  ctx.strokeStyle = '#80d0ff'; ctx.lineWidth = Math.max(0.5, 0.8*s);
  ctx.beginPath(); ctx.moveTo(x, y-18*s); ctx.lineTo(x+10*s, y-8*s); ctx.lineTo(x, y+2*s); ctx.lineTo(x-10*s, y-8*s); ctx.closePath(); ctx.stroke();
  // sparkle
  const sp = (frame*0.08)%(Math.PI*2);
  ctx.fillStyle = `rgba(200,240,255,${0.5+Math.sin(sp)*0.4})`;
  ctx.fillRect(x-1*s, y-20*s, 2*s, 5*s);
  ctx.fillRect(x-2.5*s, y-17.5*s, 5*s, 2*s);
}

function drawRuby(x, y, s) {
  // Gold pulsing outer glow — signals "collect me"
  const pulse = 0.55 + Math.sin(frame*0.12 + 1.2)*0.35;
  const goldGlow = ctx.createRadialGradient(x, y-8*s, 2*s, x, y-8*s, 18*s);
  goldGlow.addColorStop(0, `rgba(255,210,40,${0.5*pulse})`);
  goldGlow.addColorStop(0.5, `rgba(255,180,0,${0.25*pulse})`);
  goldGlow.addColorStop(1, 'rgba(255,180,0,0)');
  ctx.fillStyle = goldGlow; ctx.fillRect(x-20*s, y-26*s, 40*s, 36*s);

  const glow = ctx.createRadialGradient(x, y-7*s, 0, x, y-7*s, 12*s);
  glow.addColorStop(0, 'rgba(255,60,80,0.45)');
  glow.addColorStop(1, 'rgba(255,60,80,0)');
  ctx.fillStyle = glow; ctx.fillRect(x-12*s, y-18*s, 24*s, 24*s);
  // hexagonal ruby shape
  ctx.fillStyle = '#cc1133';
  ctx.beginPath();
  ctx.moveTo(x-6*s, y-17*s);   // top-left
  ctx.lineTo(x+6*s, y-17*s);   // top-right
  ctx.lineTo(x+11*s, y-8*s);   // right
  ctx.lineTo(x+6*s, y+1*s);    // bottom-right
  ctx.lineTo(x-6*s, y+1*s);    // bottom-left
  ctx.lineTo(x-11*s, y-8*s);   // left
  ctx.closePath(); ctx.fill();
  // facets
  ctx.fillStyle = '#ff4466';
  ctx.beginPath(); ctx.moveTo(x-6*s, y-17*s); ctx.lineTo(x+6*s, y-17*s); ctx.lineTo(x, y-8*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#880022';
  ctx.beginPath(); ctx.moveTo(x, y-8*s); ctx.lineTo(x+11*s, y-8*s); ctx.lineTo(x+6*s, y+1*s); ctx.lineTo(x-6*s, y+1*s); ctx.lineTo(x-11*s, y-8*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.moveTo(x-4*s, y-16*s); ctx.lineTo(x+2*s, y-12*s); ctx.lineTo(x-2*s, y-12*s); ctx.closePath(); ctx.fill();
  // outline
  ctx.strokeStyle = '#ff8899'; ctx.lineWidth = Math.max(0.5, 0.8*s);
  ctx.beginPath(); ctx.moveTo(x-6*s, y-17*s); ctx.lineTo(x+6*s, y-17*s); ctx.lineTo(x+11*s, y-8*s); ctx.lineTo(x+6*s, y+1*s); ctx.lineTo(x-6*s, y+1*s); ctx.lineTo(x-11*s, y-8*s); ctx.closePath(); ctx.stroke();
  // sparkle
  const sp = (frame*0.09+1)%(Math.PI*2);
  ctx.fillStyle = `rgba(255,200,210,${0.5+Math.sin(sp)*0.4})`;
  ctx.fillRect(x-1*s, y-20*s, 2*s, 5*s);
  ctx.fillRect(x-2.5*s, y-18.5*s, 5*s, 2*s);
}

// TREASURE OBSTACLE (collectible — not a hazard)
function drawTreasure(ob) {
  const s = perspScale(ob.y) * 1.4;
  if (ob.t === 'diamond') drawDiamond(ob.x, ob.y, s);
  else drawRuby(ob.x, ob.y, s);
}

// ANACONDA OBSTACLE — green coiled snake ready to strike
function drawAnaconda(x, y, s) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(x, y+2*s, 18*s, 5*s, 0, 0, Math.PI*2); ctx.fill();

  // === COILED BODY — 3 overlapping rings ===
  ctx.strokeStyle = '#2d6e1a'; ctx.lineWidth = 9*s;
  ctx.beginPath(); ctx.ellipse(x, y-4*s, 14*s, 7*s, 0, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#38881f'; ctx.lineWidth = 8*s;
  ctx.beginPath(); ctx.ellipse(x+1*s, y-8*s, 10*s, 5*s, 0.2, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#2d6e1a'; ctx.lineWidth = 7*s;
  ctx.beginPath(); ctx.ellipse(x-1*s, y-11*s, 7*s, 3.5*s, -0.1, 0, Math.PI*2); ctx.stroke();

  // Yellow belly stripe on coils
  ctx.strokeStyle = '#c8b840'; ctx.lineWidth = 2.5*s;
  ctx.setLineDash([4*s, 5*s]);
  ctx.beginPath(); ctx.ellipse(x, y-4*s, 14*s, 7*s, 0, 0.2, Math.PI*1.8); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x+1*s, y-8*s, 10*s, 5*s, 0.2, 0.2, Math.PI*1.8); ctx.stroke();
  ctx.setLineDash([]);

  // Dark blotch pattern
  ctx.fillStyle = 'rgba(15,45,5,0.55)';
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2;
    const bx2 = x + Math.cos(a)*13*s, by2 = y-4*s + Math.sin(a)*6*s;
    ctx.beginPath(); ctx.ellipse(bx2, by2, 2.5*s, 1.8*s, a, 0, Math.PI*2); ctx.fill();
  }

  // === S-CURVE NECK ===
  ctx.strokeStyle = '#38881f'; ctx.lineWidth = 7*s;
  ctx.beginPath();
  ctx.moveTo(x+3*s, y-14*s);
  ctx.bezierCurveTo(x+12*s, y-18*s, x+8*s, y-24*s, x+4*s, y-28*s);
  ctx.stroke();
  ctx.strokeStyle = '#c8b840'; ctx.lineWidth = 2*s;
  ctx.beginPath();
  ctx.moveTo(x+5*s, y-14*s);
  ctx.bezierCurveTo(x+13*s, y-18*s, x+9*s, y-24*s, x+5*s, y-27*s);
  ctx.stroke();

  // === HEAD — triangular ===
  ctx.fillStyle = '#2d6e1a';
  ctx.beginPath();
  ctx.moveTo(x+4*s,  y-28*s);
  ctx.lineTo(x+18*s, y-26*s);
  ctx.lineTo(x+4*s,  y-24*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#38881f';
  ctx.beginPath();
  ctx.moveTo(x+4*s,  y-28*s);
  ctx.lineTo(x+17*s, y-26*s);
  ctx.lineTo(x+10*s, y-29*s);
  ctx.closePath(); ctx.fill();
  // Heat pit
  ctx.fillStyle = '#1a4010';
  ctx.beginPath(); ctx.arc(x+14*s, y-27*s, 1.2*s, 0, Math.PI*2); ctx.fill();
  // Eye — golden slit pupil
  ctx.fillStyle = '#e8c020';
  ctx.beginPath(); ctx.ellipse(x+9*s, y-27.5*s, 2*s, 1.5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath(); ctx.ellipse(x+9*s, y-27.5*s, 0.6*s, 1.4*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x+8.5*s, y-28*s, 0.5*s, 0, Math.PI*2); ctx.fill();
  // Forked tongue (animated flick)
  if (Math.sin(frame * 0.25) > 0.3) {
    ctx.strokeStyle = '#cc2222'; ctx.lineWidth = Math.max(0.8, 1*s);
    ctx.beginPath(); ctx.moveTo(x+17*s, y-26*s); ctx.lineTo(x+22*s, y-25*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+22*s, y-25*s); ctx.lineTo(x+24*s, y-23*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+22*s, y-25*s); ctx.lineTo(x+24*s, y-27*s); ctx.stroke();
  }
}

function drawJaguar(x, y, s) {
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(x,y+4*s,22*s,5*s,0,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='#d4a020';
  ctx.beginPath(); ctx.ellipse(x,y-6*s,20*s,10*s,0,0,Math.PI*2); ctx.fill();
  // rosette spots on body
  ctx.fillStyle='#2a1a00';
  [[x-10*s,y-6*s],[x-2*s,y-10*s],[x+8*s,y-5*s],[x+2*s,y-2*s],[x-6*s,y-2*s]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,2.5*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c89018'; ctx.beginPath(); ctx.arc(sx,sy,1.5*s,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a1a00';
  });
  // Head (facing player — snarling)
  ctx.fillStyle='#d4a020';
  ctx.beginPath(); ctx.ellipse(x+16*s,y-8*s,12*s,10*s,0,0,Math.PI*2); ctx.fill();
  // snout/muzzle
  ctx.fillStyle='#e8c080';
  ctx.beginPath(); ctx.ellipse(x+24*s,y-6*s,7*s,6*s,0,0,Math.PI*2); ctx.fill();
  // fierce eyes — glowing
  ctx.fillStyle='#ffcc00';
  ctx.beginPath(); ctx.ellipse(x+14*s,y-12*s,3*s,2*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+20*s,y-12*s,3*s,2*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a0a00';
  ctx.beginPath(); ctx.arc(x+14*s,y-12*s,1.2*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+20*s,y-12*s,1.2*s,0,Math.PI*2); ctx.fill();
  // snarl lines + nose
  ctx.fillStyle='#2a1a00'; ctx.fillRect(x+22*s,y-8*s,5*s,2*s); // nose
  ctx.strokeStyle='#8a3010'; ctx.lineWidth=Math.max(1,1.2*s);
  ctx.beginPath(); ctx.moveTo(x+21*s,y-5*s); ctx.lineTo(x+18*s,y-2*s); ctx.stroke(); // snarl left
  ctx.beginPath(); ctx.moveTo(x+25*s,y-5*s); ctx.lineTo(x+28*s,y-2*s); ctx.stroke(); // snarl right
  // fangs
  ctx.fillStyle='#fffff0';
  ctx.beginPath(); ctx.moveTo(x+20*s,y-4*s); ctx.lineTo(x+18*s,y+2*s); ctx.lineTo(x+22*s,y-2*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+26*s,y-4*s); ctx.lineTo(x+24*s,y+2*s); ctx.lineTo(x+28*s,y-2*s); ctx.closePath(); ctx.fill();
  // ears
  ctx.fillStyle='#d4a020';
  ctx.beginPath(); ctx.moveTo(x+12*s,y-17*s); ctx.lineTo(x+8*s,y-24*s); ctx.lineTo(x+16*s,y-20*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+22*s,y-17*s); ctx.lineTo(x+24*s,y-24*s); ctx.lineTo(x+28*s,y-18*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#a07018'; ctx.beginPath(); ctx.moveTo(x+12*s,y-18*s); ctx.lineTo(x+10*s,y-22*s); ctx.lineTo(x+15*s,y-20*s); ctx.closePath(); ctx.fill();
  // head spots
  ctx.fillStyle='#2a1a00';
  [[x+13*s,y-9*s],[x+19*s,y-8*s]].forEach(([sx,sy])=>{ ctx.beginPath(); ctx.arc(sx,sy,1.8*s,0,Math.PI*2); ctx.fill(); });
  // Tail curled up
  ctx.strokeStyle='#d4a020'; ctx.lineWidth=Math.max(2,4*s);
  ctx.beginPath(); ctx.moveTo(x-20*s,y-4*s); ctx.quadraticCurveTo(x-30*s,y-16*s,x-22*s,y-22*s); ctx.stroke();
  ctx.fillStyle='#2a1a00'; // tail tip
  ctx.beginPath(); ctx.arc(x-22*s,y-22*s,3*s,0,Math.PI*2); ctx.fill();
  // Legs (crouching prowl pose)
  ctx.fillStyle='#c89018';
  ctx.fillRect(x-12*s,y,6*s,8*s); ctx.fillRect(x-2*s,y+2*s,6*s,6*s);
  ctx.fillRect(x+6*s,y,6*s,8*s);  ctx.fillRect(x+14*s,y+2*s,5*s,6*s);
  // paws
  ctx.fillStyle='#e8c080';
  ctx.fillRect(x-13*s,y+7*s,8*s,3*s); ctx.fillRect(x-3*s,y+7*s,8*s,3*s);
  ctx.fillRect(x+5*s,y+7*s,8*s,3*s); ctx.fillRect(x+13*s,y+7*s,7*s,3*s);
}

function drawObstacle(ob) {
  const s = perspScale(ob.y)*2, x = ob.x, y = ob.y;
  // ground shadow
  const swx = 28*s;
  const grd = ctx.createRadialGradient(x,y+4*s,0,x,y+4*s,swx);
  grd.addColorStop(0,`rgba(0,0,0,${0.4*perspScale(ob.y)})`);
  grd.addColorStop(0.5,`rgba(0,0,0,${0.18*perspScale(ob.y)})`);
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.ellipse(x,y+4*s,swx,7*s,0,0,Math.PI*2); ctx.fill();

  if (ob.t==='tree') {
    drawToppledLog(x,y,s);
  } else if (ob.t==='rock') {
    drawSpider(x,y,s);
  } else if (ob.t==='snake') {
    drawAnaconda(x,y,s);
  } else {
    drawJaguar(x,y,s);
  }
}

function getHB(ob) {
  const s = perspScale(ob.y)*2, x = ob.x;
  if (ob.t==='tree') return {x:x-28*s,y:ob.y-8*s,w:56*s,h:12*s};
  if (ob.t==='rock') return {x:x-18*s,y:ob.y-20*s,w:36*s,h:22*s};
  if (ob.t==='snake') return {x:x-16*s,y:ob.y-18*s,w:34*s,h:20*s};
  return {x:x-20*s,y:ob.y-18*s,w:40*s,h:26*s};
}

function checkHit() {
  if (isJumping) return false;
  const mx = LANE_X_BOT[lane], my = GROUND_Y;
  const mb = {x:mx-14, y:my-52, w:28, h:58};
  for (const ob of obs) {
    if (ob.lane !== lane) continue;
    const hb = getHB(ob);
    // Full AABB — both X and Y must overlap
    const xOverlap = mb.x < hb.x+hb.w && mb.x+mb.w > hb.x;
    const yOverlap = mb.y < hb.y+hb.h && mb.y+mb.h > hb.y;
    if (xOverlap && yOverlap) return true;
  }
  return false;
}

function addParticles(x,y) {
  for (let i=0;i<14;i++) {
    const a=Math.random()*Math.PI*2, v=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:35,c:['#ff4444','#ffaa00','#f0c040','#ff8800'][Math.floor(Math.random()*4)]});
  }
}
function addPopup(x,y,pts,col){popups.push({x,y,life:50,vy:-1.4,pts,col:col||null});}

function spawnObs() {
  const types=['tree','tree','rock','rock','utv','snake'];
  const t=types[Math.floor(Math.random()*types.length)];
  const multi=spawnRate<60&&Math.random()<0.35;
  const l1=Math.floor(Math.random()*3);
  obs.push({x:laneXatY(l1,HORIZON_Y+10),y:HORIZON_Y+10,t,lane:l1,counted:false,jumped:false});
  if (multi) {
    let l2=Math.floor(Math.random()*3); if(l2===l1)l2=(l1+1)%3;
    const t2=types[Math.floor(Math.random()*types.length)];
    obs.push({x:laneXatY(l2,HORIZON_Y+10),y:HORIZON_Y+10,t:t2,lane:l2,counted:false,jumped:false});
  }
}

function updateJump() {
  if (!isJumping) return;
  jumpT++;
  const progress=jumpT/JUMP_DUR;
  jumpOffsetY=-JUMP_HEIGHT*4*progress*(1-progress);
  obs.forEach(o=>{
    if(o.jumped||o.counted||o.lane!==lane)return;
    if(o.y>H-120&&o.y<H+20&&isJumping)o.jumped=true;
  });
  if(jumpT>=JUMP_DUR){isJumping=false;jumpT=0;jumpOffsetY=0;sndLand();}
}

// ============================================================
//  GAME LOOP
// ============================================================
function update() {
  if (state!=='playing') return;
  frame++;

  // Score milestone cockatoo
  if (score>=nextBannerScore) {
    const skyY=HORIZON_Y*0.35+Math.random()*HORIZON_Y*0.4;
    banners.push({x:-300,skyY,pts:nextBannerScore,propT:0});
    nextBannerScore+=500;
  }
  banners.forEach(pl=>{pl.x+=3.6;pl.propT=(pl.propT+0.42)%(Math.PI*2);});
  banners=banners.filter(pl=>pl.x<W+500);

  if(!isJumping&&frame%12===0)sndStep();
  scoreTick++;
  if(scoreTick>=4){scoreTick=0;score++;}

  clouds.forEach(c=>{c.x+=c.spd;if(c.x>W+c.w)c.x=-c.w-20;});

  if(frame-lastSecFrame>=60){
    elapsedSecs++;lastSecFrame=frame;
    if(elapsedSecs%10===0)spawnRate=Math.max(24,spawnRate-8);
  }

  groundLines.forEach(gl=>{gl.prog+=spd*0.004;if(gl.prog>1)gl.prog=0;});
  spawnT++;
  if(spawnT>spawnRate){spawnObs();spawnT=0;}

  obs.forEach(o=>{
    const t=Math.max(0,(o.y-HORIZON_Y)/(H-HORIZON_Y));
    o.y+=spd*(0.3+t*1.4);
    o.x=laneXatY(o.lane,o.y);
    if(!o.jumped&&isJumping&&o.lane===lane&&o.y>H-140&&o.y<H+30)o.jumped=true;
    if(!o.counted&&o.y>H+20){
      o.counted=true;obsPassedCount++;
      const pts=o.jumped?20:10;
      score+=pts;
      addPopup(LANE_X_BOT[o.lane],H-90,pts);
      if(pts===20)sndCheer();
      spd=Math.min(baseSpd*Math.pow(1.01,obsPassedCount),14);
      document.getElementById('spv').textContent=(spd/baseSpd).toFixed(1);
    }
  });
  obs=obs.filter(o=>{
    if(o.y>=H+80){if(o.t==='utv')sndUTVStop(o);return false;}
    return true;
  });

  // Treasure spawning — only if no obstacle is nearby on that lane
  treasureSpawnT++;
  if (treasureSpawnT > TREASURE_SPAWN_RATE) {
    treasureSpawnT = 0;
    const tl = Math.floor(Math.random()*3);
    const tt = Math.random() < 0.5 ? 'diamond' : 'ruby';
    // Check no obstacle within 140px depth on same lane
    const tooClose = obs.some(o => o.lane===tl && o.y < HORIZON_Y + 160);
    if (!tooClose) {
      treasures.push({x:laneXatY(tl,HORIZON_Y+10), y:HORIZON_Y+10, t:tt, lane:tl, collected:false});
    }
  }

  // Move treasures and check collection
  treasures.forEach(tr => {
    const t = Math.max(0,(tr.y-HORIZON_Y)/(H-HORIZON_Y));
    tr.y += spd*(0.3+t*1.4);
    tr.x = laneXatY(tr.lane, tr.y);
    if (!tr.collected && tr.lane===lane && tr.y > H-160 && tr.y < H+30) {
      const dy = Math.abs(tr.y - (GROUND_Y+jumpOffsetY));
      if (dy < 55) {
        tr.collected = true;
        score += 50;
        addPopup(tr.x, tr.y-30, 50, tr.t==='diamond'?'#40c8ff':'#ff4466');
        sndCheer();
      }
    }
  });
  treasures = treasures.filter(tr => tr.y < H+80 && !tr.collected);

  updateJump();
  updateUTVEngines();

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);
  popups.forEach(p=>{p.y+=p.vy;p.life--;});
  popups=popups.filter(p=>p.life>0);

  if(checkHit()){
    addParticles(LANE_X_BOT[lane],GROUND_Y-20);
    obs.forEach(o=>{if(o.t==='utv')sndUTVStop(o);});
    stopMusic();
    state='dead';deathT=0;
    if(score>hi)hi=score;
    sndGameOver();
  }
  document.getElementById('sv').textContent=Math.floor(score);
  document.getElementById('hv').textContent=Math.floor(hi);
}

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,type,startVol,endVol,dur,startTime,dest){
  if(musicMuted) return;
  const ac=getAudio(),t=startTime||ac.currentTime;
  const osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain);gain.connect(dest||ac.destination);
  osc.type=type||'square';osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(startVol,t);gain.gain.linearRampToValueAtTime(endVol,t+dur);
  osc.start(t);osc.stop(t+dur+0.01);
}
function playNoise(dur,filterFreq,vol,startTime){
  if(musicMuted) return;
  const ac=getAudio(),t=startTime||ac.currentTime;
  const bufSize=ac.sampleRate*dur,buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<bufSize;i++)data[i]=Math.random()*2-1;
  const src=ac.createBufferSource();src.buffer=buf;
  const filter=ac.createBiquadFilter();filter.type='bandpass';filter.frequency.value=filterFreq;filter.Q.value=0.8;
  const gain=ac.createGain();gain.gain.setValueAtTime(vol,t);gain.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(filter);filter.connect(gain);gain.connect(ac.destination);src.start(t);src.stop(t+dur+0.01);
}

const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,Bb4:466.16,Bb3:233.08,_:0};

let musicNodes=[],musicTimeout=null,musicPlaying=false;

function stopMusic(){
  musicPlaying=false;
  if(musicTimeout){clearTimeout(musicTimeout);musicTimeout=null;}
  musicNodes.forEach(n=>{try{n.stop();}catch(e){}});
  musicNodes=[];
}

function scheduleNote(ac,freq,type,vol,startTime,dur){
  if(freq===0)return;
  const osc=ac.createOscillator(),gain=ac.createGain();
  osc.type=type;osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,startTime);
  gain.gain.linearRampToValueAtTime(vol,startTime+0.01);
  gain.gain.setValueAtTime(vol,startTime+dur*0.65);
  gain.gain.linearRampToValueAtTime(0,startTime+dur*0.92);
  osc.connect(gain);gain.connect(ac.destination);osc.start(startTime);osc.stop(startTime+dur+0.01);
  musicNodes.push(osc);
}

function schedulePercussion(ac,startTime,isBeat){
  // Tom drum feel — lower frequency than hi-hat
  const bufSize=Math.floor(ac.sampleRate*(isBeat?0.08:0.04));
  const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*(1-i/bufSize);
  const src=ac.createBufferSource();src.buffer=buf;
  const filter=ac.createBiquadFilter();filter.type='bandpass';
  filter.frequency.value=isBeat?180:400; // deep tom on beats, mid on off-beats
  const g=ac.createGain();
  g.gain.setValueAtTime(isBeat?0.105:0.045,startTime);
  g.gain.linearRampToValueAtTime(0,startTime+(isBeat?0.08:0.04));
  src.connect(filter);filter.connect(g);g.connect(ac.destination);src.start(startTime);src.stop(startTime+(isBeat?0.1:0.05));
  musicNodes.push(src);
}

function playMusicLoop(){
  if(!musicPlaying)return;
  const ac=getAudio();
  let melodyTime=ac.currentTime+0.05,bassTime=ac.currentTime+0.05;
  for(const[name,dur]of MELODY){
    let freq=NOTE[name]||0;
    scheduleNote(ac,freq,'square',0.06,melodyTime,dur*S*0.88);
    melodyTime+=dur*S;
  }
  for(const[name,dur]of BASS){
    const freq=NOTE[name]||0;
    scheduleNote(ac,freq,'triangle',0.083,bassTime,dur*S*0.75);
    bassTime+=dur*S;
  }
  const loopDur=MELODY.reduce((s,[,d])=>s+d,0)*S;
  let hatTime=ac.currentTime+0.05;let beatCount=0;
  while(hatTime<ac.currentTime+0.05+loopDur){
    schedulePercussion(ac,hatTime,beatCount%2===0);
    hatTime+=BEAT*0.5;beatCount++;
  }
  musicTimeout=setTimeout(playMusicLoop,loopDur*1000-200);
}

function startMusic(){if(musicPlaying||musicMuted)return;musicPlaying=true;playMusicLoop();}

const LB_KEY = 'jbara_leaderboard_v1';
let leaderboard = [];

async function loadLeaderboard() {
  try {
    const res = await window.storage.get(LB_KEY, true);
    leaderboard = res ? JSON.parse(res.value) : [];
  } catch(e) { leaderboard = []; }
  // Seed placeholder scores if leaderboard is empty (shown until real scores come in)
  if (leaderboard.length === 0) {
    leaderboard = [
      { name: 'TAM', score: 9623 },
      { name: 'SEM', score: 8762 },
      { name: 'MJM', score: 4107 },
    ];
  }
  renderLeaderboard();
}

async function saveLeaderboard() {
  try {
    await window.storage.set(LB_KEY, JSON.stringify(leaderboard), true);
  } catch(e) {}
  renderLeaderboard();
}

function renderLeaderboard() {
  const el = document.getElementById('leaderboard-rows');
  if (!leaderboard.length) {
    el.innerHTML = '<span style="color:#604020;font-size:8px;font-family:\'Cinzel\',serif;">No scores yet — be the first!</span>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = leaderboard.slice(0,3).map((e,i) => `
    <div class="lb-entry">
      <span class="lb-rank">${medals[i]||'#'+(i+1)}</span>
      <span class="lb-name">${e.name}</span>
      <span class="lb-score">${e.score.toLocaleString()}</span>
    </div>`).join('');
}

function isLeaderboardQualifying(s) {
  if (s <= 0) return false;
  if (leaderboard.length < 10) return true;
  return s > leaderboard[leaderboard.length - 1].score;
}

function showInitialsPrompt(finalScore) {
  const overlay = document.getElementById('initials-overlay');
  const input   = document.getElementById('initials-input');
  const scoreEl = document.getElementById('initials-score');
  scoreEl.textContent = 'SCORE: ' + Math.floor(finalScore).toLocaleString();
  input.value = '';
  overlay.classList.add('show');
  // Prevent game input while overlay is visible
  setTimeout(() => input.focus(), 80);

  function submit() {
    const name = input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,3).padEnd(3,'?');
    if (name.replace(/\?/g,'').length === 0) return;
    overlay.classList.remove('show');
    leaderboard.push({ name, score: Math.floor(finalScore) });
    leaderboard.sort((a,b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 10);
    saveLeaderboard();
  }

  document.getElementById('initials-submit').onclick = submit;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
  };
  // Force uppercase as user types
  input.oninput = () => { input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g,''); };
}

    stopMusic();
    btn.textContent = '▶';
    btn.classList.add('active');
    btn.title = 'Resume';
  } else {
    btn.textContent = '⏸';
    btn.classList.remove('active');
    btn.title = 'Pause';
    if (!musicMuted) startMusic();
  }
});

function loop() {
  if (!gamePaused) update();
  checkLeaderboardOnDeath();
  draw();
  if (gamePaused && state === 'playing') {
    ctx.fillStyle = 'rgba(10,2,25,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.shadowColor = '#f0c040'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#f0c040';
    ctx.font = 'bold 28px "Cinzel Decorative"';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#a08040';
    ctx.font = '9px "Cinzel"';
    ctx.fillText('CLICK ▶ TO RESUME', W/2, H/2 + 28);
    ctx.textAlign = 'left';
  }
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='idle'){startGame();return;}
    if(state==='dead'&&deathT>60&&!isInitialsOpen()){if(!holdingSpace){holdingSpace=true;holdSpaceT=Date.now();}return;}
    if(state==='playing'&&!isJumping){isJumping=true;jumpT=0;sndJump();}
    return;
  }
  if(state!=='playing')return;
  if(e.code==='ArrowLeft'){e.preventDefault();const prev=lane;lane=Math.max(0,lane-1);if(lane!==prev)sndSwoosh();}
  if(e.code==='ArrowRight'){e.preventDefault();const prev=lane;lane=Math.min(2,lane+1);if(lane!==prev)sndSwoosh();}
});
document.addEventListener('keyup',e=>{if(e.code==='Space')holdingSpace=false;});

loop();
</script>
<script>
// ---- MOBILE SCALING ----
function scaleGame(){
  const wrap=document.getElementById('scale-wrap');
  // Full content stack: banner(80) + hud(~26) + canvas(360) + msg(~18) + touch-hint(~14) + pulse-cta(~20) + leaderboard(~38) + gaps
  const gameWidth=606, gameHeight=610;
  const scale=Math.min(window.innerWidth/gameWidth, window.innerHeight/gameHeight)*0.94;
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='center center';
}
window.addEventListener('resize',scaleGame);
window.addEventListener('load',scaleGame);
document.fonts.ready.then(scaleGame);

// ---- TOUCH CONTROLS ----
const SWIPE_THRESHOLD=30;
let touchStartX=0,touchStartY=0,touchMoved=false;
// ---- MOBILE BUTTON TAP HELPER ----
function isTouchOnEl(touch, el) {
  const r = el.getBoundingClientRect();
  return touch.clientX >= r.left && touch.clientX <= r.right &&
         touch.clientY >= r.top  && touch.clientY <= r.bottom;
}

document.addEventListener('touchstart',e=>{
  // Let button taps through before game intercepts
  const t = e.touches[0];
  if (isTouchOnEl(t, document.getElementById('btn-pause')) ||
      isTouchOnEl(t, document.getElementById('btn-mute'))) {
    return; // don't preventDefault — let the button fire normally
  }
  touchStartX=t.clientX;touchStartY=t.clientY;touchMoved=false;
  if(typeof state!=='undefined'&&state==='dead'&&deathT>60&&!isInitialsOpen()){holdingSpace=true;holdSpaceT=Date.now();}
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',e=>{touchMoved=true;e.preventDefault();},{passive:false});
document.addEventListener('touchend',e=>{
  const t = e.changedTouches[0];
  // Let button taps through
  if (isTouchOnEl(t, document.getElementById('btn-pause')) ||
      isTouchOnEl(t, document.getElementById('btn-mute'))) {
    return;
  }
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const absDx=Math.abs(dx),absDy=Math.abs(dy);
  if(absDx<SWIPE_THRESHOLD&&absDy<SWIPE_THRESHOLD){
    if(typeof state!=='undefined'){
      if(state==='idle'){startGame();}
      else if(state==='dead'&&deathT>60&&!isInitialsOpen()){if(holdingSpace&&Date.now()-holdSpaceT>=HOLD_RESTART_MS)startGame();holdingSpace=false;}
      else if(state==='playing'&&!isJumping){isJumping=true;jumpT=0;sndJump();}
    }
    e.preventDefault();return;
  }
  if(typeof state!=='undefined'&&state==='playing'){
    if(absDy>absDx&&dy<-SWIPE_THRESHOLD){if(!isJumping){isJumping=true;jumpT=0;sndJump();}}
    else if(absDx>absDy){
      if(dx<-SWIPE_THRESHOLD){const prev=lane;lane=Math.max(0,lane-1);if(lane!==prev)sndSwoosh();}
      else if(dx>SWIPE_THRESHOLD){const prev=lane;lane=Math.min(2,lane+1);if(lane!==prev)sndSwoosh();}
    }
  } else if(typeof state!=='undefined'&&state==='idle'){startGame();}
  else if(typeof state!=='undefined'&&state==='dead'&&deathT>60&&!isInitialsOpen()&&holdingSpace&&Date.now()-holdSpaceT>=HOLD_RESTART_MS){startGame();}
  e.preventDefault();
},{passive:false});
</script>
